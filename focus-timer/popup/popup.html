<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stoic Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Stoic Focus</h1>

    <!-- Featured Quote -->
    <div class="quote-section">
      <div id="featuredQuote" class="featured-quote"></div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="domains" role="tab" aria-selected="true">Blocked Domains</button>
      <button class="tab-btn" data-tab="presets" role="tab" aria-selected="false">Presets</button>
    </nav>

    <!-- Tab Panels -->
    <div class="tab-panels">

      <!-- Blocked Domains Panel -->
      <section id="domainsPanel" class="tab-panel active" role="tabpanel">
        <div id="editBanner" class="edit-banner" hidden>
          <span>Editing preset: <strong id="editBannerName"></strong></span>
          <button id="cancelEditBtn" class="link-btn" type="button">Cancel</button>
        </div>

        <div class="sub-section">
          <h2>Blocked Domains</h2>
          <div class="input-group">
            <input
              type="text"
              id="domainInput"
              placeholder="e.g., reddit.com, mail.google.com"
              autocomplete="off"
            >
            <button id="addDomainBtn">Add</button>
          </div>
          <div id="errorMessage" class="error-message"></div>
          <ul id="domainList" class="domain-list"></ul>
        </div>

        <div class="sub-section">
          <h2>
            Timer
            <span class="info-bubble" aria-label="Maximum 24 hours">i</span>
          </h2>
          <div class="timer-input-group">
            <input
              type="number"
              id="timerValue"
              min="1"
              max="1440"
              value="60"
            >
            <select id="timerUnit">
              <option value="minutes">Minutes</option>
              <option value="hours">Hours</option>
            </select>
          </div>
          <div id="timerErrorMessage" class="error-message"></div>
          <button id="startBlockingBtn" class="primary-btn" disabled>Start Blocking</button>
          <button id="resetBtn" class="secondary-btn">Reset</button>
          <div id="timerStatus" class="timer-status"></div>
        </div>

        <div id="saveCtaFooter" class="save-cta-footer" hidden>
          <button id="saveAsPresetBtn" class="secondary-btn" type="button" hidden>Save as preset</button>
          <div id="editCtaRow" class="cta-row" hidden>
            <button id="saveChangesBtn" type="button">Save changes</button>
            <button id="saveAsNewPresetBtn" class="secondary-btn" type="button">Save as new preset</button>
          </div>
        </div>
      </section>

      <!-- Presets Panel -->
      <section id="presetsPanel" class="tab-panel" role="tabpanel">
        <div id="newPresetForm" class="new-preset-form" hidden>
          <label for="newPresetName" class="new-preset-label">Name this preset</label>
          <input
            type="text"
            id="newPresetName"
            placeholder="e.g., Deep Work"
            autocomplete="off"
          >
          <div id="newPresetError" class="error-message"></div>
          <div class="new-preset-actions">
            <button id="confirmSavePresetBtn" type="button">Save preset</button>
            <button id="cancelSavePresetBtn" class="link-btn" type="button">Cancel</button>
          </div>
        </div>

        <div id="presetList" class="preset-list"></div>
        <div id="presetEmptyState" class="empty-state" hidden>
          No presets yet. Add domains and a timer on the Blocked Domains tab, then tap "Save as preset".
        </div>
      </section>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
